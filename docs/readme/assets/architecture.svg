<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">AI Config Hub architecture overview</title>
  <desc id="desc">Desktop, CLI, and local Web UI entry points share the API layer, core use cases, adapters, scanner, deployer, storage, Git, and local configuration files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#60a5fa" />
    </marker>
    <style>
      .title {
        fill: #f8fafc;
        font: 800 32px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .section {
        fill: #e2e8f0;
        font: 800 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .body {
        fill: #cbd5e1;
        font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .pill {
        fill: #93c5fd;
        font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
      }
    </style>
  </defs>

  <rect width="1180" height="560" rx="24" fill="url(#bg)" />
  <text class="title" x="48" y="58">Architecture Overview</text>
  <text class="body" x="48" y="88">Local entry points share one domain model; privileged IO remains behind API, scanner, deployer, storage, and Git ports.</text>

  <g transform="translate(48 126)">
    <rect width="220" height="96" rx="18" fill="#162033" stroke="#334155" />
    <text class="pill" x="24" y="32">ENTRY</text>
    <text class="section" x="24" y="62">Desktop App</text>
    <text class="body" x="24" y="84">Electron main + React UI</text>
  </g>
  <g transform="translate(298 126)">
    <rect width="220" height="96" rx="18" fill="#162033" stroke="#334155" />
    <text class="pill" x="24" y="32">ENTRY</text>
    <text class="section" x="24" y="62">CLI</text>
    <text class="body" x="24" y="84">Node.js command line</text>
  </g>
  <g transform="translate(548 126)">
    <rect width="220" height="96" rx="18" fill="#162033" stroke="#334155" />
    <text class="pill" x="24" y="32">ENTRY</text>
    <text class="section" x="24" y="62">Local Web UI</text>
    <text class="body" x="24" y="84">Browser over Local API</text>
  </g>

  <path d="M158 222 V266" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M408 222 V266" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M658 222 V266" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />

  <g transform="translate(48 278)">
    <rect width="720" height="104" rx="18" fill="#172554" stroke="#2563eb" />
    <text class="pill" x="24" y="34">SHARED BUSINESS SURFACE</text>
    <text class="section" x="24" y="66">packages/api + packages/core</text>
    <text class="body" x="24" y="88">Versioned commands, typed events, use cases, domain model, stable errors, and task semantics.</text>
  </g>

  <path d="M408 382 V424" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />

  <g transform="translate(48 436)">
    <rect width="132" height="76" rx="16" fill="#1e293b" stroke="#334155" />
    <text class="section" x="20" y="34">Adapters</text>
    <text class="body" x="20" y="57">Tool formats</text>
  </g>
  <g transform="translate(204 436)">
    <rect width="132" height="76" rx="16" fill="#1e293b" stroke="#334155" />
    <text class="section" x="20" y="34">Scanner</text>
    <text class="body" x="20" y="57">Read only</text>
  </g>
  <g transform="translate(360 436)">
    <rect width="132" height="76" rx="16" fill="#1e293b" stroke="#334155" />
    <text class="section" x="20" y="34">Deployer</text>
    <text class="body" x="20" y="57">Safe writes</text>
  </g>
  <g transform="translate(516 436)">
    <rect width="132" height="76" rx="16" fill="#1e293b" stroke="#334155" />
    <text class="section" x="20" y="34">Storage</text>
    <text class="body" x="20" y="57">SQLite index</text>
  </g>
  <g transform="translate(672 436)">
    <rect width="96" height="76" rx="16" fill="#1e293b" stroke="#334155" />
    <text class="section" x="20" y="34">Git</text>
    <text class="body" x="20" y="57">Evidence</text>
  </g>

  <g transform="translate(830 126)">
    <rect width="302" height="386" rx="22" fill="#111827" stroke="#475569" />
    <text class="pill" x="28" y="40">LOCAL BOUNDARY</text>
    <text class="section" x="28" y="72">Privileged resources</text>
    <rect x="28" y="100" width="246" height="62" rx="14" fill="#0f172a" stroke="#334155" />
    <text class="section" x="50" y="134">Tool config files</text>
    <text class="body" x="50" y="154">Source of truth</text>
    <rect x="28" y="184" width="246" height="62" rx="14" fill="#0f172a" stroke="#334155" />
    <text class="section" x="50" y="218">SQLite</text>
    <text class="body" x="50" y="238">Rebuildable indexes</text>
    <rect x="28" y="268" width="246" height="62" rx="14" fill="#0f172a" stroke="#334155" />
    <text class="section" x="50" y="302">Git repositories</text>
    <text class="body" x="50" y="322">History and recovery</text>
    <text class="body" x="28" y="364">Renderer code has no direct access</text>
    <text class="body" x="28" y="386">to files, shell, SQLite, or Git.</text>
  </g>

  <path d="M768 330 C798 330 806 318 830 318" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M768 474 C798 474 806 372 830 372" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
</svg>
