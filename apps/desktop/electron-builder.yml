appId: io.aiconfighub.desktop
productName: AI Config Hub
executableName: ai-config-hub
copyright: Copyright © 2026 AI Config Hub
asar: true
npmRebuild: false
buildDependenciesFromSource: false
directories:
  output: ../../release/linux-x64
files:
  - package.json
  - dist/main/**/*
  - dist/renderer/**/*
  - resources/**/*
  - ../../packages/*/dist/**/*
  - ../../packages/*/package.json
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/fixtures/**"
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: AI-Config-Hub-${version}-x86_64.${ext}
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: AI-Config-Hub-${version}-windows-x64.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: AI-Config-Hub-${version}-macos-${arch}.${ext}
